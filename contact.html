<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact — Wiles Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #FFFBDF;
      --dark: #243521;
      --dark2: #1a2718;
      --accent: #e8c84a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--dark);
      color: var(--cream);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.4rem 3rem;
      backdrop-filter: blur(12px);
      background: rgba(36, 53, 33, 0.8);
      border-bottom: 1px solid rgba(255,251,223,0.06);
    }

    .nav-logo svg { height: 26px; width: auto; }

    .nav-back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--cream);
      text-decoration: none;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    .nav-back:hover { opacity: 1; }
    .nav-back svg { width: 14px; height: 14px; }

    /* MAIN */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8rem 2rem 4rem;
      position: relative;
      overflow: hidden;
    }

    /* background grid */
    main::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,251,223,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,251,223,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* glow */
    .glow {
      position: absolute;
      top: 20%; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,200,74,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .contact-wrap {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 560px;
    }

    .contact-eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .contact-eyebrow::before {
      content: '';
      display: inline-block;
      width: 20px; height: 1px;
      background: var(--accent);
    }

    .contact-title {
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
      margin-bottom: 0.8rem;
    }

    .contact-sub {
      font-size: 0.95rem;
      opacity: 0.45;
      line-height: 1.6;
      margin-bottom: 3rem;
    }

    /* FORM */
    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0.5;
      margin-bottom: 0.5rem;
    }

    input, textarea, select {
      width: 100%;
      background: rgba(255,251,223,0.04);
      border: 1px solid rgba(255,251,223,0.1);
      border-radius: 4px;
      padding: 0.85rem 1rem;
      color: var(--cream);
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      -webkit-appearance: none;
    }

    input::placeholder, textarea::placeholder {
      opacity: 0.25;
    }

    input:focus, textarea:focus, select:focus {
      border-color: rgba(232,200,74,0.4);
      background: rgba(255,251,223,0.06);
    }

    textarea {
      resize: vertical;
      min-height: 130px;
    }

    select option {
      background: var(--dark);
      color: var(--cream);
    }

    /* select arrow */
    .select-wrap {
      position: relative;
    }
    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      opacity: 0.4;
      font-size: 0.8rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .btn-submit {
      width: 100%;
      background: var(--cream);
      color: var(--dark);
      border: none;
      border-radius: 4px;
      padding: 1rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }
    .btn-submit:hover { background: var(--accent); transform: translateY(-2px); }
    .btn-submit:active { transform: translateY(0); }

    /* SUCCESS STATE */
    .success-msg {
      display: none;
      text-align: center;
      padding: 3rem 2rem;
      background: rgba(255,251,223,0.03);
      border: 1px solid rgba(255,251,223,0.08);
      border-radius: 6px;
    }
    .success-msg .check {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }
    .success-msg h3 {
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
    }
    .success-msg p {
      opacity: 0.45;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    /* FOOTER */
    footer {
      padding: 2rem 3rem;
      border-top: 1px solid rgba(255,251,223,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    footer svg { height: 18px; width: auto; opacity: 0.35; }
    .footer-links { display: flex; gap: 2rem; list-style: none; }
    .footer-links a {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--cream);
      text-decoration: none;
      opacity: 0.3;
      transition: opacity 0.2s;
    }
    .footer-links a:hover { opacity: 0.7; }
    .footer-copy {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      opacity: 0.2;
    }

    @media (max-width: 600px) {
      nav { padding: 1.2rem 1.5rem; }
      main { padding: 7rem 1.5rem 3rem; }
      .form-row { grid-template-columns: 1fr; }
      footer { padding: 1.5rem; flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">

  </a>
  <a href="index.html" class="nav-back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Back
  </a>
</nav>

<main>
  <div class="glow"></div>

  <div class="contact-wrap">
    <p class="contact-eyebrow">Wiles Studio</p>
    <h1 class="contact-title">Get in Touch</h1>
    <p class="contact-sub">A question, a collab idea, a bug report? Send us a message — we read everything.</p>

    <!-- Formspree form — replace YOUR_FORM_ID with your actual Formspree ID -->
    <form id="contact-form" action="https://formspree.io/f/mlgpgaoz" method="POST">

      <div class="form-row">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required />
        </div>
      </div>

      <div class="form-group">
        <label for="subject">Subject</label>
        <div class="select-wrap">
          <select id="subject" name="subject">
            <option value="general">General question</option>
            <option value="bug">Bug report</option>
            <option value="collab">Collaboration</option>
            <option value="press">Press / Media</option>
            <option value="other">Other</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Tell us what's on your mind..." required></textarea>
      </div>

      <!-- hidden redirect after submit -->
      <input type="hidden" name="_next" value="https://YOUR_GITHUB_USERNAME.github.io/contact.html?sent=true" />
      <input type="hidden" name="_subject" value="New message from Wiles Studio website" />

      <button type="submit" class="btn-submit">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        Send Message
      </button>
    </form>

    <div class="success-msg" id="success">
      <div class="check">✅</div>
      <h3>Message sent!</h3>
      <p>Thanks for reaching out. We'll get back to you as soon as possible.</p>
    </div>
  </div>
</main>

5 170.064 303.101 199.365 266.989 199.365Z" fill="#FFFBDF"/><path d="M332.485 1.46954H293.246V134.054H332.485V1.46954Z" fill="#FFFBDF"/><path d="M189.93 39.3077C186.847 33.1827 180.772 29.1106 173.91 28.5833C167.059 28.0561 160.422 31.141 156.428 36.7163L84.8798 136.601L41.9283 1.46954H0.765625L59.3429 185.713C61.5928 192.78 67.6452 197.974 74.98 199.13C76.0037 199.287 77.0275 199.365 78.0399 199.365C84.306 199.365 90.2796 196.359 94.0033 191.176L169.455 85.851L208.998 164.41L244.063 146.865L189.93 39.3189V39.3077Z" fill="#FFFBDF"/></g><defs><clipPath id="ft"><rect width="845" height="203" fill="white"/></clipPath></defs></svg>

    <li><a href="index.html">Home</a></li>
    <li><a href="privacy.html">Privacy Policy</a></li>
    <li><a href="terms.html">Terms</a></li>
  </ul>
  <span class="footer-copy">© 2026 Wiles Studio</span>

<script>
  // Show success if redirected back with ?sent=true
  if (window.location.search.includes('sent=true')) {
    document.getElementById('contact-form').style.display = 'none';
    document.getElementById('success').style.display = 'block';
  }

  // Also handle via JS fetch for smoother UX (no page reload)
  const form = document.getElementById('contact-form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = form.querySelector('.btn-submit');
    btn.textContent = 'Sending...';
    btn.disabled = true;

    try {
      const res = await fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      });
      if (res.ok) {
        form.style.display = 'none';
        document.getElementById('success').style.display = 'block';
      } else {
        btn.textContent = 'Error — Try again';
        btn.disabled = false;
      }
    } catch {
      btn.textContent = 'Error — Try again';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
